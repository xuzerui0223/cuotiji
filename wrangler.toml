# Cloudflare Pages 配置（用于本地开发 wrangler pages dev；生产部署推荐在 Cloudflare 控制台绑定 D1）
name = "cuotiji"
pages_build_output_dir = "."
compatibility_date = "2024-09-23"

# D1 数据库绑定。生产部署请在 Cloudflare 控制台「Pages 项目 → Settings → Functions → D1 数据库绑定」中添加：
#   变量名(variable name) = DB
#   数据库 = 你创建的 cuotiji-db
# 本地开发时，把 database_id 填成你在 Cloudflare 控制台 D1 里看到的 ID，或仅用控制台绑定即可。
[[d1_databases]]
binding = "DB"
database_name = "cuotiji-db"
database_id = "REPLACE_WITH_YOUR_D1_ID"
